<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miss Miriam English Classes</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para traducir JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Animaciones Personalizadas */
        @keyframes blob {
          0% { transform: translate(0px, 0px) scale(1); }
          33% { transform: translate(30px, -50px) scale(1.1); }
          66% { transform: translate(-20px, 20px) scale(0.9); }
          100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-20px); }
          100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS (SVG Directos para portabilidad) ---
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
        const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
        const MessageCircle = (p) => <Icon {...p}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></Icon>;
        const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const PlayCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></Icon>;
        const Star = (p) => <Icon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
        const CheckCircle = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></Icon>;
        const Baby = (p) => <Icon {...p}><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.7 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.7A9 9 0 0 1 12 2v0a9 9 0 0 1 7 4.3z"/></Icon>;
        const GraduationCap = (p) => <Icon {...p}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></Icon>;
        const Briefcase = (p) => <Icon {...p}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Monitor = (p) => <Icon {...p}><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></Icon>;
        const Quote = (p) => <Icon {...p}><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></Icon>;
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;

        // --- APP PRINCIPAL ---
        const App = () => {
          const [activeSegment, setActiveSegment] = useState('todos');
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [scrolled, setScrolled] = useState(false);

          useEffect(() => {
            const handleScroll = () => {
              setScrolled(window.scrollY > 20);
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const phoneNumber = "524612306876";

          const scrollToSection = (id) => {
            const element = document.getElementById(id);
            if (element) {
              element.scrollIntoView({ behavior: 'smooth' });
            }
            setIsMenuOpen(false);
          };

          const segments = {
            ninos: {
              title: "Kids & Teens",
              subtitle: "Inglés para Niños",
              icon: <Baby className="w-8 h-8" />,
              description: "¡Aprender jugando es posible! Un método natural donde el inglés se convierte en su superpoder favorito.",
              benefits: ["Gamificación y Juegos", "Ayuda Escolar", "Material Didáctico Divertido"],
              image: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80&w=800",
              color: "from-yellow-400 to-orange-500"
            },
            jovenes: {
              title: "Students",
              subtitle: "Inglés para Jóvenes",
              icon: <GraduationCap className="w-8 h-8" />,
              description: "El impulso que necesitas para la universidad y el mundo. Domina el idioma sin aburrirte.",
              benefits: ["Club de Conversación", "Apoyo Académico", "Preparación para el Futuro"],
              image: "https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&q=80&w=800",
              color: "from-blue-400 to-indigo-500"
            },
            adultos: {
              title: "Pro & Business",
              subtitle: "Inglés para Adultos",
              icon: <Briefcase className="w-8 h-8" />,
              description: "Rompe las barreras laborales. Clases diseñadas para gente ocupada que busca resultados reales.",
              benefits: ["Horarios Flexibles", "Enfoque 100% Conversacional", "Networking"],
              image: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=800",
              color: "from-red-500 to-pink-600"
            }
          };

          return (
            <div className="font-sans text-slate-800 bg-slate-50 min-h-screen flex flex-col overflow-x-hidden selection:bg-red-200 selection:text-red-900">
              
              {/* Background Decorativo Global */}
              <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-200/20 rounded-full blur-[100px] animate-blob mix-blend-multiply"></div>
                <div className="absolute bottom-[10%] right-[-5%] w-[30%] h-[30%] bg-red-200/20 rounded-full blur-[80px] animate-blob animation-delay-2000 mix-blend-multiply"></div>
                <div className="absolute bottom-[50%] left-[20%] w-[30%] h-[30%] bg-pink-200/20 rounded-full blur-[80px] animate-blob animation-delay-4000 mix-blend-multiply"></div>
              </div>

              {/* Navbar Premium */}
              <nav className={`fixed w-full z-50 transition-all duration-500 border-b ${scrolled ? 'bg-white/90 backdrop-blur-lg border-slate-200 py-3 shadow-lg' : 'bg-transparent border-transparent py-6'}`}>
                <div className="container mx-auto px-6 flex justify-between items-center">
                  <div className="flex items-center gap-3 group cursor-pointer" onClick={() => scrollToSection('inicio')}>
                    <div className="relative">
                      <div className="absolute inset-0 bg-red-600 rounded-lg blur opacity-40 group-hover:opacity-60 transition duration-300"></div>
                      <div className="relative bg-gradient-to-br from-red-700 to-red-900 text-white p-2.5 rounded-xl shadow-xl transform group-hover:rotate-6 transition duration-300 border border-white/20">
                        <BookOpen size={24} />
                      </div>
                    </div>
                    <div>
                      <span className={`text-2xl font-black tracking-tighter uppercase ${scrolled ? 'text-slate-900' : 'text-slate-900 md:text-white drop-shadow-md'}`}>
                        Miss <span className="text-red-600">Miriam</span>
                      </span>
                      <p className={`text-xs font-bold tracking-widest uppercase ${scrolled ? 'text-slate-500' : 'text-slate-300 md:text-blue-100'}`}>English Classes</p>
                    </div>
                  </div>

                  <div className="hidden md:flex items-center gap-1">
                    {['Inicio', 'Metodología', 'Cursos', 'Testimonios'].map((item) => (
                      <button 
                        key={item} 
                        onClick={() => scrollToSection(item.toLowerCase())}
                        className={`px-5 py-2 rounded-full text-sm font-bold transition-all duration-300 ${
                          scrolled 
                            ? 'text-slate-600 hover:bg-slate-100 hover:text-red-700' 
                            : 'text-white/80 hover:bg-white/10 hover:text-white'
                        }`}
                      >
                        {item}
                      </button>
                    ))}
                    <a 
                      href={`https://wa.me/${phoneNumber}`}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="ml-4 bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-500 hover:to-pink-500 text-white px-8 py-3 rounded-full font-bold shadow-lg shadow-red-500/30 hover:shadow-red-500/50 transform hover:-translate-y-1 transition-all duration-300 flex items-center gap-2 group"
                    >
                      Agenda Clase
                      <ChevronRight size={18} className="group-hover:translate-x-1 transition-transform" />
                    </a>
                  </div>

                  <button className="md:hidden text-slate-800 bg-white/80 backdrop-blur p-2 rounded-lg" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                    {isMenuOpen ? <X size={28} /> : <Menu size={28} />}
                  </button>
                </div>

                {/* Mobile Menu Overlay */}
                {isMenuOpen && (
                  <div className="md:hidden absolute top-full left-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 shadow-2xl animate-in slide-in-from-top-5">
                    <div className="flex flex-col p-6 gap-2">
                      {['Inicio', 'Metodología', 'Cursos', 'Testimonios'].map((item) => (
                        <button 
                          key={item} 
                          onClick={() => scrollToSection(item.toLowerCase())}
                          className="text-left text-lg font-bold text-slate-600 py-3 px-4 rounded-xl hover:bg-slate-50 hover:text-red-600 transition-colors"
                        >
                          {item}
                        </button>
                      ))}
                      <a 
                        href={`https://wa.me/${phoneNumber}`}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="bg-red-600 text-white text-center py-4 rounded-xl font-bold mt-4 shadow-lg active:scale-95 transition-transform"
                      >
                        ¡Contactar Ahora!
                      </a>
                    </div>
                  </div>
                )}
              </nav>

              {/* Hero Section */}
              <header id="inicio" className="relative min-h-screen flex items-center pt-20 overflow-hidden bg-slate-900">
                <div className="absolute inset-0 z-0">
                  <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1513258496098-882605922721?auto=format&fit=crop&q=80&w=2000')] bg-cover bg-center opacity-40 mix-blend-overlay"></div>
                  <div className="absolute inset-0 bg-gradient-to-r from-slate-900 via-slate-900/90 to-blue-900/40"></div>
                  <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-red-500/20 via-transparent to-transparent"></div>
                </div>

                <div className="container mx-auto px-6 relative z-10 grid md:grid-cols-2 gap-12 items-center">
                  <div className="text-left space-y-8">
                    <div className="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 rounded-full px-5 py-2 text-white text-sm font-bold shadow-lg">
                      <span className="relative flex h-3 w-3">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                      </span>
                      Inscripciones Abiertas • Querétaro & Online
                    </div>
                    
                    <h1 className="text-5xl md:text-7xl font-black text-white leading-tight">
                      Habla Inglés <br/>
                      <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-400 via-orange-400 to-yellow-400 filter drop-shadow-lg">
                        Sin Límites
                      </span>
                    </h1>
                    
                    <p className="text-lg md:text-xl text-slate-300 font-light max-w-lg leading-relaxed border-l-4 border-red-500 pl-6">
                      El método personalizado de <strong>Miss Miriam</strong> que desbloquea tu potencial. Deja de traducir y empieza a pensar en inglés hoy mismo.
                    </p>
                    
                    <div className="flex flex-col sm:flex-row gap-5">
                      <a 
                        href={`https://wa.me/${phoneNumber}?text=Hola,%20me%20interesa%20la%20clase%20muestra.`}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="group bg-red-600 text-white text-lg px-8 py-4 rounded-2xl font-bold transition-all hover:bg-red-700 shadow-xl shadow-red-900/20 flex items-center justify-center gap-3 hover:-translate-y-1"
                      >
                        Solicitar Clase Muestra
                        <ArrowRight className="group-hover:translate-x-1 transition-transform" />
                      </a>
                      <button 
                        onClick={() => scrollToSection('metodología')}
                        className="bg-white/5 backdrop-blur-md text-white border border-white/20 text-lg px-8 py-4 rounded-2xl font-bold hover:bg-white/10 transition-all flex items-center justify-center gap-3 hover:-translate-y-1"
                      >
                        <PlayCircle size={24} className="text-red-400" />
                        Ver Metodología
                      </button>
                    </div>

                    <div className="flex items-center gap-4 pt-8 border-t border-white/10">
                      <div className="flex -space-x-3">
                        {[1,2,3,4].map(i => (
                          <div key={i} className="w-10 h-10 rounded-full bg-slate-700 border-2 border-slate-900 flex items-center justify-center text-xs text-white font-bold">
                            {String.fromCharCode(64 + i)}
                          </div>
                        ))}
                      </div>
                      <div>
                        <div className="flex text-yellow-400 gap-0.5">
                          {[...Array(5)].map((_,i) => <Star key={i} size={14} fill="currentColor" />)}
                        </div>
                        <p className="text-slate-400 text-sm font-medium">+500 alumnos graduados</p>
                      </div>
                    </div>
                  </div>

                  {/* Hero Derecho */}
                  <div className="hidden md:block relative h-[600px] w-full">
                     <div className="absolute top-10 right-10 w-full h-full bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-[3rem] opacity-20 rotate-6 animate-pulse"></div>
                     <div className="absolute top-10 right-10 w-full h-full bg-[url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&q=80&w=800')] bg-cover bg-center rounded-[3rem] shadow-2xl border-4 border-white/10 rotate-3 hover:rotate-0 transition-all duration-700 scale-90 hover:scale-95">
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-60"></div>
                        
                        <div className="absolute bottom-12 left-[-2rem] bg-white/90 backdrop-blur-xl p-5 rounded-2xl shadow-2xl animate-float">
                          <div className="flex items-center gap-3">
                            <div className="bg-green-100 p-2 rounded-lg text-green-600">
                              <CheckCircle size={24} />
                            </div>
                            <div>
                              <p className="font-bold text-slate-900">Resultados Reales</p>
                              <p className="text-xs text-slate-500">Desde la primera clase</p>
                            </div>
                          </div>
                        </div>

                        <div className="absolute top-12 right-[-2rem] bg-white/90 backdrop-blur-xl p-5 rounded-2xl shadow-2xl animate-float" style={{ animationDelay: '2s' }}>
                           <div className="flex items-center gap-2">
                             <span className="text-2xl">🇺🇸</span>
                             <span className="text-2xl">🇬🇧</span>
                             <span className="text-2xl">🇨🇦</span>
                           </div>
                        </div>
                     </div>
                  </div>
                </div>
              </header>

              {/* Secciones Interactivas */}
              <section id="cursos" className="py-24 relative bg-white">
                <div className="container mx-auto px-6 relative z-10">
                  <div className="text-center max-w-3xl mx-auto mb-16">
                    <span className="text-red-600 font-black tracking-widest uppercase text-sm bg-red-50 px-4 py-2 rounded-full">Nuestros Programas</span>
                    <h2 className="text-4xl md:text-5xl font-black text-slate-900 mt-6 mb-6">
                      Elige tu camino al <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">éxito</span>
                    </h2>
                    <p className="text-slate-600 text-lg">Programas diseñados específicamente para cada etapa de la vida. Contenido relevante, dinámico y efectivo.</p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                    {Object.keys(segments).map((key) => {
                      const item = segments[key];
                      const isActive = activeSegment === key || activeSegment === 'todos';
                      
                      return (
                        <div 
                          key={key} 
                          className={`group relative bg-white rounded-[2rem] p-2 border border-slate-100 shadow-2xl shadow-slate-200/50 hover:shadow-slate-300/80 transition-all duration-500 hover:-translate-y-2 overflow-hidden ${!isActive ? 'opacity-50 grayscale scale-95' : ''}`}
                          onMouseEnter={() => setActiveSegment(key)}
                          onMouseLeave={() => setActiveSegment('todos')}
                        >
                          <div className={`absolute top-0 left-0 w-full h-2 bg-gradient-to-r ${item.color}`}></div>
                          
                          <div className="relative h-48 rounded-t-[1.5rem] overflow-hidden">
                            <div className={`absolute inset-0 bg-gradient-to-br ${item.color} opacity-90 group-hover:opacity-80 transition-opacity z-10`}></div>
                            <img src={item.image} alt={item.title} className="absolute inset-0 w-full h-full object-cover mix-blend-overlay scale-110 group-hover:scale-100 transition-transform duration-700" />
                            
                            <div className="absolute bottom-4 left-4 z-20 text-white">
                              <div className="bg-white/20 backdrop-blur-md p-2 rounded-lg w-fit mb-2">
                                {item.icon}
                              </div>
                              <h3 className="text-2xl font-black">{item.title}</h3>
                              <p className="text-white/90 text-sm font-medium">{item.subtitle}</p>
                            </div>
                          </div>

                          <div className="p-6 pt-8">
                            <p className="text-slate-600 mb-6 leading-relaxed font-medium">
                              {item.description}
                            </p>
                            <div className="space-y-4 mb-8">
                              {item.benefits.map((benefit, i) => (
                                <div key={i} className="flex items-center gap-3">
                                  <div className={`w-6 h-6 rounded-full bg-gradient-to-r ${item.color} flex items-center justify-center text-white flex-shrink-0`}>
                                    <CheckCircle size={14} strokeWidth={3} />
                                  </div>
                                  <span className="text-slate-700 font-semibold text-sm">{benefit}</span>
                                </div>
                              ))}
                            </div>
                            <a 
                              href={`https://wa.me/${phoneNumber}?text=Info%20sobre%20${item.title}`}
                              target="_blank"
                              rel="noopener noreferrer"
                              className={`w-full block text-center py-4 rounded-xl font-bold border-2 transition-all ${
                                activeSegment === key 
                                  ? `bg-slate-900 text-white border-slate-900 hover:bg-slate-800` 
                                  : 'bg-white text-slate-900 border-slate-200 hover:border-slate-900'
                              }`}
                            >
                              Ver Detalles
                            </a>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </section>

              {/* Metodología */}
              <section id="metodología" className="py-24 bg-slate-900 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-1/2 h-full bg-blue-900/20 skew-x-12 transform origin-top-right"></div>
                <div className="absolute bottom-0 left-0 w-64 h-64 bg-red-600/20 rounded-full blur-[100px]"></div>

                <div className="container mx-auto px-6 relative z-10">
                  <div className="flex flex-col md:flex-row gap-16 items-center">
                    <div className="md:w-1/2">
                      <span className="text-red-400 font-bold tracking-widest uppercase mb-2 block">Why Choose Us?</span>
                      <h2 className="text-4xl md:text-5xl font-black text-white mb-8 leading-tight">
                        No es magia, <br/>es <span className="text-blue-400">Metodología.</span>
                      </h2>
                      <p className="text-slate-400 text-lg mb-12 leading-relaxed">
                        Olvídate de las clases aburridas de "rellenar espacios". Aquí vienes a hablar, a interactuar y a vivir el idioma. Adaptamos el contenido a tu estilo de vida, ya sea que prefieras el contacto humano o la libertad digital.
                      </p>

                      <div className="grid gap-6">
                        <div className="group bg-white/5 hover:bg-white/10 p-6 rounded-2xl border border-white/10 transition-all cursor-default">
                          <div className="flex items-start gap-4">
                            <div className="bg-red-600 p-3 rounded-xl text-white shadow-lg group-hover:scale-110 transition-transform">
                              <MapPin size={24} />
                            </div>
                            <div>
                              <h4 className="text-xl font-bold text-white mb-2">Presencial en Querétaro</h4>
                              <p className="text-slate-400 text-sm">Ubicación accesible. Sumérgete en un ambiente de aprendizaje físico con dinámicas grupales que aceleran tu confianza.</p>
                            </div>
                          </div>
                        </div>

                        <div className="group bg-white/5 hover:bg-white/10 p-6 rounded-2xl border border-white/10 transition-all cursor-default">
                          <div className="flex items-start gap-4">
                            <div className="bg-blue-600 p-3 rounded-xl text-white shadow-lg group-hover:scale-110 transition-transform">
                              <Monitor size={24} />
                            </div>
                            <div>
                              <h4 className="text-xl font-bold text-white mb-2">Online En Vivo</h4>
                              <p className="text-slate-400 text-sm">Tecnología al servicio de tu aprendizaje. Pizarra digital interactiva, recursos multimedia y cero grabaciones.</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="md:w-1/2 relative">
                       <div className="relative z-10 grid grid-cols-2 gap-4">
                          <img src="https://images.unsplash.com/photo-1571260899304-425eee4c7efc?auto=format&fit=crop&q=80&w=400" className="rounded-2xl shadow-2xl mt-12 transform -rotate-3 hover:rotate-0 transition-transform duration-500" alt="Student smiling" />
                          <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=400" className="rounded-2xl shadow-2xl mb-12 transform rotate-3 hover:rotate-0 transition-transform duration-500" alt="Group study" />
                       </div>
                       <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] border border-white/10 rounded-full animate-spin-slow pointer-events-none"></div>
                    </div>
                  </div>
                </div>
              </section>

              {/* Testimonios */}
              <section id="testimonios" className="py-24 bg-slate-50 relative">
                <div className="container mx-auto px-6">
                  <div className="text-center mb-16">
                    <h2 className="text-4xl font-black text-slate-900 mb-4">Historias de Éxito</h2>
                    <div className="w-24 h-1.5 bg-red-600 mx-auto rounded-full"></div>
                  </div>
                  
                  <div className="grid md:grid-cols-3 gap-8">
                    {[
                      { name: "Mariana G.", role: "Madre de Familia", text: "Mi hijo odiaba el inglés, pero con Miss Miriam ahora es su clase favorita. Ha mejorado mucho sus calificaciones.", color: "bg-orange-100 text-orange-600" },
                      { name: "Carlos M.", role: "Universitario", text: "Logré pasar mi examen de certificación gracias a las clases personalizadas. La paciencia de la Miss es increíble.", color: "bg-blue-100 text-blue-600" },
                      { name: "Andrea R.", role: "Ejecutiva", text: "Necesitaba inglés para un ascenso. Las clases online se ajustaron perfecto a mi horario de oficina. ¡Muy recomendado!", color: "bg-pink-100 text-pink-600" }
                    ].map((testimonial, idx) => (
                      <div key={idx} className="bg-white p-8 rounded-[2rem] shadow-xl hover:shadow-2xl transition-all duration-300 border border-slate-100 group">
                        <div className="mb-6 flex justify-between items-start">
                          <div className={`p-3 rounded-full ${testimonial.color}`}>
                            <Quote size={24} fill="currentColor" />
                          </div>
                          <div className="flex text-yellow-400">
                            {[...Array(5)].map((_, i) => <Star key={i} size={16} fill="currentColor" />)}
                          </div>
                        </div>
                        <p className="text-slate-600 text-lg italic mb-6 leading-relaxed">"{testimonial.text}"</p>
                        <div className="border-t border-slate-100 pt-4">
                          <div className="font-bold text-slate-900 text-lg">{testimonial.name}</div>
                          <div className="text-slate-400 text-sm font-medium uppercase tracking-wide">{testimonial.role}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              {/* Footer */}
              <footer className="bg-slate-950 text-slate-400 py-16 border-t border-slate-900">
                <div className="container mx-auto px-6">
                  <div className="grid md:grid-cols-4 gap-12 mb-12">
                    <div className="col-span-1 md:col-span-2">
                      <h2 className="text-3xl font-black text-white mb-6">Miss <span className="text-red-600">Miriam</span></h2>
                      <p className="text-slate-500 mb-6 max-w-sm">
                        Transformando futuros a través del idioma. Clases diseñadas con pasión, experiencia y resultados comprobados.
                      </p>
                      <div className="flex gap-4">
                        <a href={`https://wa.me/${phoneNumber}`} className="bg-green-600 hover:bg-green-500 text-white p-3 rounded-full transition-colors">
                          <MessageCircle size={20} />
                        </a>
                        <div className="bg-slate-800 p-3 rounded-full text-slate-400 hover:text-white transition-colors cursor-pointer">
                          <Globe size={20} />
                        </div>
                      </div>
                    </div>
                    
                    <div>
                      <h3 className="text-white font-bold mb-6">Explorar</h3>
                      <ul className="space-y-4">
                        <li><button onClick={() => scrollToSection('inicio')} className="hover:text-red-500 transition-colors">Inicio</button></li>
                        <li><button onClick={() => scrollToSection('cursos')} className="hover:text-red-500 transition-colors">Cursos</button></li>
                        <li><button onClick={() => scrollToSection('metodología')} className="hover:text-red-500 transition-colors">Metodología</button></li>
                      </ul>
                    </div>

                    <div>
                      <h3 className="text-white font-bold mb-6">Contacto</h3>
                      <ul className="space-y-4 text-sm">
                        <li className="flex items-center gap-3">
                          <MapPin size={16} className="text-red-600" />
                          Querétaro, Qro. México
                        </li>
                        <li className="flex items-center gap-3">
                          <Monitor size={16} className="text-blue-600" />
                          Disponible Globalmente Online
                        </li>
                        <li className="flex items-center gap-3">
                          <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                          Agenda tu clase: <span className="text-white font-bold">461 230 6876</span>
                        </li>
                      </ul>
                    </div>
                  </div>
                  
                  <div className="border-t border-slate-900 pt-8 flex flex-col md:flex-row justify-between items-center text-xs text-slate-600">
                    <p>© {new Date().getFullYear()} Miss Miriam English Classes. All rights reserved.</p>
                    <p>Designed with excellence.</p>
                  </div>
                </div>
              </footer>

              {/* Floating Button */}
              <a 
                href={`https://wa.me/${phoneNumber}?text=Hola,%20quisiera%20más%20información.`}
                target="_blank"
                rel="noopener noreferrer"
                className="fixed bottom-8 right-8 z-50 group"
              >
                <div className="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-20 duration-1000"></div>
                <div className="bg-green-500 hover:bg-green-400 text-white p-4 rounded-full shadow-2xl shadow-green-900/30 transform transition-all duration-300 group-hover:scale-110 group-hover:-rotate-12 flex items-center justify-center">
                  <MessageCircle size={32} fill="white" />
                </div>
              </a>

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
